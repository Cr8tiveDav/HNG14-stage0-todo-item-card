<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Item Card</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <article data-testid="test-todo-card">
      <!-- View Task Mode -->
      <div class="view-task">
        <!-- Header -->
        <header>
          <div class="checkbox-priority-badge">
            <!-- Checkbox -->
            <input
              type="checkbox"
              name="checkbox"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
            />

            <!-- Priority Badge -->
            <div class="priority-badge">
              <span
                data-testid="test-todo-priority-indicator"
                class="priority-dot"
              ></span>
              <span
                data-testid="test-todo-priority"
                class="priority-text"
              ></span>
            </div>
          </div>

          <!-- Title -->
          <h3 data-testid="test-todo-title" class="task-title"></h3>
        </header>

        <!-- To do Description -->
        <div
          data-testid="test-todo-collapsible-section"
          class="description-container"
        >
          <p data-testid="test-todo-description" class="task-description"></p>
        </div>
        <button data-testid="test-todo-expand-toggle" class="show-more-btn">
          See less
        </button>

        <!-- Status Indicator and Control -->
        <div class="status-container">
          <select
            data-testid="test-todo-status-control"
            aria-label="Change task status"
            id="todo-priority"
            name="priority"
            class="status-controller"
          >
            <option value="pending">Pending</option>
            <option value="in progress">In Progress</option>
            <option value="done">Done</option>
          </select>

          <span
            data-testid="test-todo-status"
            class="status status-pending status-indicator"
          >
            Pending
          </span>
        </div>

        <!-- Due Data -->
        <div class="deadline">
          <div class="date">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#3b82f6"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-calendar-icon lucide-calendar"
            >
              <path d="M8 2v4" />
              <path d="M16 2v4" />
              <rect width="18" height="18" x="3" y="4" rx="2" />
              <path d="M3 10h18" />
            </svg>
            <time
              data-testid="test-todo-due-date"
              datetime="2026-04-16"
              class="due-date"
            >
              Due April 16, 2026
            </time>
          </div>
          <!-- Current Time Remaining -->
          <div
            class="time-remaining-container"
            data-testid="test-todo-overdue-indicator"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#e67e22"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-alarm-clock-icon lucide-alarm-clock"
            >
              <circle cx="12" cy="13" r="8" />
              <path d="M12 9v4l2 2" />
              <path d="M5 3 2 6" />
              <path d="m22 6-3-3" />
              <path d="M6.38 18.7 4 21" />
              <path d="M17.64 18.67 20 21" />
            </svg>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#14b8a6"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-circle-check-icon lucide-circle-check hidden"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="m9 12 2 2 4-4" />
            </svg>
            <time
              data-testid="test-todo-time-remaining"
              aria-live="polite"
              class="due-time time-remaining"
              datetime="2026-04-16T00:00"
            >
              Loading...
            </time>
          </div>
        </div>

        <!-- Tags -->
        <ul>
          <li data-testid="test-todo-tag-internship">Internship</li>
          <li data-testid="test-todo-tag-task">Task</li>
          <li data-testid="test-todo-tag-frontend">Frontend</li>
        </ul>

        <!-- Action Button -->
        <div class="action-btn">
          <!-- Edit -->
          <button
            type="button"
            class="edit-btn icon-btn"
            aria-label="Edit task"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-pen-line-icon lucide-pen-line"
            >
              <path d="M13 21h8" />
              <path
                d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"
              />
            </svg>
          </button>
          <!-- Delete -->
          <button
            type="button"
            class="delete-btn icon-btn"
            aria-label="Delete task"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-trash2-icon lucide-trash-2"
            >
              <path d="M10 11v6" />
              <path d="M14 11v6" />
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
              <path d="M3 6h18" />
              <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Edit Task Mode -->
      <form data-testid="test-todo-edit-form" class="edit-form hidden">
        <h3 class="form-header">Edit Todo Card</h3>
        <!-- Title -->
        <div class="field">
          <label for="todo-title">Title</label>
          <input
            data-testid="test-todo-edit-title-input"
            type="text"
            id="todo-title"
            name="title"
            class="title-input"
          />
          <p class="error-message hidden" id="title-error">
            Title is required.
          </p>
        </div>

        <!-- Description -->
        <div class="field">
          <label for="todo-description">Description</label>
          <textarea
            data-testid="test-todo-edit-description-input"
            id="todo-description"
            name="description"
            rows="10"
            class="description-input"
          ></textarea>
          <p class="error-message hidden" id="description-error">
            Description is required
          </p>
        </div>

        <div class="field-group">
          <!-- Priority -->
          <div class="field">
            <label for="todo-priority">Priority</label>
            <select
              data-testid="test-todo-edit-priority-select"
              id="todo-priority"
              name="priority"
              class="priority-input"
            >
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <!-- Due Date -->
          <div class="field">
            <label for="todo-due-date">Due Date</label>
            <input
              data-testid="test-todo-edit-due-date-input"
              type="datetime-local"
              id="todo-due-date"
              name="dueDate"
              class="due-date-input"
            />
            <p class="error-message hidden" id="due-date-error">
              Due date is required
            </p>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="edit-view-action-btns">
          <!-- Cancel Button -->
          <button
            data-testid="test-todo-cancel-button"
            type="button"
            class="cancel-btn"
          >
            Cancel
          </button>
          <!-- Save Button -->
          <button
            data-testid="test-todo-save-button"
            type="submit"
            class="save-btn"
          >
            Save
          </button>
        </div>
      </form>
    </article>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
